<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎬 YTDown</h1>
        </div>

        <div id="update-banner" class="update-banner" style="display: none;"></div>

        <!-- Tab Switcher -->
        <div class="tabs">
            <button type="button" class="tab-btn active" data-tab="batch">Download</button>
            <button type="button" class="tab-btn" data-tab="compress">Compress</button>
        </div>

        <!-- Download Tab -->
        <div id="batch" class="tab-content active">
            <div class="batch-buttons">
                <button type="button" id="clearBatchBtn" class="action-btn secondary">Clear</button>
            </div>

            <textarea id="batchUrls" class="batch-input" placeholder="Paste video URLs here (one per line)..."></textarea>

            <div class="settings">
                <div class="setting-row">
                    <label>Format:</label>
                    <select id="batchFormatSelect">
                        <option value="MP4">MP4</option>
                        <option value="MP3">MP3</option>
                    </select>
                </div>

                <div class="setting-row" id="batchQualityRow">
                    <label>Quality:</label>
                    <select id="batchQualitySelect">
                        <option value="Best Quality">Best Quality</option>
                        <option value="1080p">1080p</option>
                        <option value="720p">720p</option>
                        <option value="480p">480p</option>
                        <option value="360p">360p</option>
                    </select>
                </div>
            </div>

            <div class="save-path">
                <label>Save to:</label>
                <div class="path-group">
                    <input type="text" id="batchSavePath" class="path-input" />
                    <button type="button" class="browse-btn" id="browseBatchBtn">Browse</button>
                </div>
            </div>

            <button type="button" class="download-btn" id="startBatchBtn">▶ Start Download</button>

            <!-- Download Progress -->
            <div class="batch-progress">
                <table class="batch-table" id="batchTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Video Title</th>
                            <th>Status</th>
                            <th>Progress</th>
                        </tr>
                    </thead>
                    <tbody id="batchTableBody"></tbody>
                </table>
                <div class="batch-summary" id="batchSummary"></div>
            </div>
        </div>

        <!-- Compress Tab -->
        <div id="compress" class="tab-content">
            <div class="compress-controls-row">
                <div class="setting-row">
                    <label>Type:</label>
                    <select id="compressType">
                        <option value="image" selected>Image</option>
                        <option value="video">Video</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>Selection:</label>
                    <select id="selectionMode">
                        <option value="file">Files</option>
                        <option value="folder">Folder</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>&nbsp;</label>
                    <button type="button" id="selectFilesBtn" class="browse-btn">📁 Select</button>
                </div>
            </div>

            <div class="file-list-container" style="margin-top: 10px;">
                <table class="batch-table" id="compressTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>File Name</th>
                            <th>Status</th>
                            <th>Progress</th>
                        </tr>
                    </thead>
                    <tbody id="compressTableBody"></tbody>
                </table>
            </div>

            <div class="settings" style="margin-top: 16px;">
                <div class="setting-row">
                    <label>Quality Level:</label>
                    <select id="compressQuality">
                        <option value="medium">Medium (Balanced)</option>
                        <option value="high">High (Keep Quality)</option>
                        <option value="low">Low (Smallest Size)</option>
                        <option value="custom">Custom Quality</option>
                    </select>
                </div>

                <div class="setting-row">
                    <label>Output Format:</label>
                    <select id="compressFormat">
                        <!-- Dynamic options -->
                    </select>
                </div>

                <div class="setting-row full-width" id="customQualityContainer" style="display: none; grid-column: span 2;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label id="customQualityLabel">Quality: 80 - High Quality</label>
                    </div>
                    <input type="range" id="customQualitySlider" min="1" max="100" value="80" style="width: 100%; margin: 10px 0;">
                </div>

                <div class="setting-row full-width" id="slowPresetContainer" style="grid-column: span 2; flex-direction: row; align-items: center; gap: 10px;">
                    <input type="checkbox" id="useSlowPreset" checked style="width: 16px; height: 16px; cursor: pointer;">
                    <label for="useSlowPreset" style="text-transform: none; cursor: pointer; letter-spacing: normal; font-size: 13px;">Slower for better compression (Recommended)</label>
                </div>
            </div>

            <div class="save-path">
                <label>Save to:</label>
                <div class="path-group">
                    <input type="text" id="compressSavePath" class="path-input" />
                    <button type="button" class="browse-btn" id="browseCompressBtn">Browse</button>
                </div>
                <small style="color: var(--text-secondary); font-size: 10px; margin-top: 4px; opacity: 0.7;">* Files will be saved in a 'Compressed' folder within this path.</small>
            </div>

            <button type="button" class="download-btn" id="startCompressBtn" disabled>⚡ Start Compression</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
