name: Release macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    env:
      TZ: Asia/Ho_Chi_Minh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build app and DMG
        id: build
        env:
          TZ: Asia/Ho_Chi_Minh
        run: bash build.sh

      - name: Upsert GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.build.outputs.version }}
        run: |
          TAG="$VERSION"
          TITLE="YTDown $VERSION"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag 
          fi

          git tag -f "$TAG" "$GITHUB_SHA"
          git push origin -f "refs/tags/$TAG"

          gh release create "$TAG" \
            "dist/YTDown-$VERSION.dmg" \
            --title "$TITLE" \
            --notes "Automated release for version $VERSION"

      - name: Update Homebrew Tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Tính sha256 của file dmg vừa build
          SHA256=$(shasum -a 256 "dist/YTDown-${{ steps.build.outputs.version }}.dmg" | awk '{print $1}')
          VERSION=${{ steps.build.outputs.version }}

          # Clone repo tap
          git clone https://x-access-token:${GH_TOKEN}@github.com/JustinNguyen9979/homebrew-ytdown.git
          cd homebrew-ytdown
          
          # Sửa version và sha256
          sed -i '' "s/version \".*\"/version \"$VERSION\"/" Casks/ytdown.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/ytdown.rb
          
          # Push lên
          git config user.email "JustinNguyen9979@github.com"
          git config user.name "GitHub Action"
          git add Casks/ytdown.rb
          git commit -m "Update ytdown to $VERSION"
          git push
