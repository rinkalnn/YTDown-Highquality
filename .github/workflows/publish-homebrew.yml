name: Publish to Homebrew Tap

on:
  release:
    types: [published]

jobs:
  publish-homebrew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout YTDown repo
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Clone homebrew-ytdown
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://JustinNguyen9979:${HOMEBREW_TAP_TOKEN}@github.com/JustinNguyen9979/homebrew-ytdown.git /tmp/homebrew-ytdown

      - name: Update Casks/ytdown.rb with new version
        env:
          VERSION: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          VERSION=${VERSION#v}  # Remove 'v' prefix if exists
          
          # Create Casks directory if not exists
          mkdir -p /tmp/homebrew-ytdown/Casks
          
          # Generate the cask formula
          cat > /tmp/homebrew-ytdown/Casks/ytdown.rb << 'EOF'
cask "ytdown" do
  version :latest

  url do |page|
    require "net/http"
    require "json"

    # Fetch the latest release from GitHub API
    uri = URI("https://api.github.com/repos/JustinNguyen9979/YTDown/releases/latest")
    http = Net::HTTP.new(uri.host, uri.port)
    http.use_ssl = true

    request = Net::HTTP::Get.new(uri.path)
    request["Accept"] = "application/vnd.github+json"

    response = http.request(request)
    if response.code == "200"
      release_data = JSON.parse(response.body)
      
      # Find the DMG asset
      dmg_asset = release_data["assets"].find { |asset| asset["name"].end_with?(".dmg") }
      raise "No DMG found in latest release" unless dmg_asset
      
      dmg_asset["browser_download_url"]
    else
      raise "Failed to fetch latest release from GitHub"
    end
  end

  appcast "https://api.github.com/repos/JustinNguyen9979/YTDown/releases.atom"

  name "YTDown"
  desc "YouTube video downloader for macOS"
  homepage "https://github.com/JustinNguyen9979/YTDown"

  depends_on macos: ">= :big_sur"

  app "YTDown.app"

  uninstall quit: "dev.ytdown.app"

  zap trash: [
    "~/Library/Application Support/YTDown",
    "~/Library/Caches/dev.ytdown.app",
    "~/Library/Preferences/dev.ytdown.app.plist",
  ]
end
EOF

      - name: Commit and push to homebrew-ytdown
        env:
          VERSION: ${{ github.event.release.tag_name }}
        working-directory: /tmp/homebrew-ytdown
        run: |
          VERSION=${VERSION#v}
          git add Casks/ytdown.rb
          git commit -m "Update YTDown to $VERSION" || echo "No changes to commit"
          git push origin main

      - name: Create README if not exists
        working-directory: /tmp/homebrew-ytdown
        run: |
          if [ ! -f README.md ]; then
            cat > README.md << 'EOF'
# Homebrew YTDown Tap

Homebrew tap for YTDown - YouTube video downloader for macOS.

## Installation

```bash
brew tap JustinNguyen9979/ytdown
brew install --cask ytdown
```

## Usage

```bash
# Check for updates
brew outdated --cask ytdown

# Update
brew upgrade --cask ytdown
```

## Uninstall

```bash
brew uninstall --cask ytdown
```

## Links

- **GitHub**: https://github.com/JustinNguyen9979/YTDown
- **Releases**: https://github.com/JustinNguyen9979/YTDown/releases

---

This tap automatically updates whenever a new release is published.
EOF
            git add README.md
            git commit -m "Add README"
            git push origin main
          fi
